server:
  port: 8080
  servlet:
    context-path: /springboot_mybatis

spring:
  datasource:
    type: com.mchange.v2.c3p0.ComboPooledDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ssm?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=true
    username: root
    password: 123456
  freemarker:
    suffix: .ftl
    content-type: text/html
    charset: UTF-8
    template-loader-path: classpath:/views/
  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true
      # 设置重启的目录，添加的文件需要restart
      additional-paths: src/main/java
      # 解决项目自动启动重新编译后接口报404问题
      poll-interval: 3000
      quiet-period: 1000

mybatis:
  mapper-locations: classpath:/mappers/*.xml
  type-aliases-package: com.xxx.springboot.po
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql

logging:
  level:
    com:
      xxx:
        springboot:
          dao: debug